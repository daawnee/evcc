# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - evcc

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Serialize deploys to the same Function App; don't cancel an in-flight deployment.
concurrency:
  group: deploy-evcc
  cancel-in-progress: false

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  PYTHON_VERSION: '3.10' # keep in sync with .python-version and the local .venv

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python version
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build UI
        run: npm ci && npm run build
        working-directory: ui

      # Only ui/dist (the built SPA) is needed at runtime. Exclude the UI sources/build config so
      # Oryx doesn't detect package.json and attempt a Node build on this Python function app.
      - name: Zip artifact for deployment
        run: >
          zip release.zip ./* -r
          -x "tests/*" ".venv/*" "venv/*"
          "ui/node_modules/*" "ui/src/*" "ui/package.json" "ui/package-lock.json"
          "ui/vite.config.js" "ui/index.html"
          "ev_database_org/*" ".scrape/*" "*.jl" "data/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v7
        with:
          name: python-app
          path: release.zip
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-function.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip && rm release.zip

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'evcc'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_0156A9BD71EF499A9241C0FDB515B492 }}
          scm-do-build-during-deployment: true
          enable-oryx-build: true
